name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck · lint · build · audit
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Match production (nixpacks.toml) — the lockfile is npm@11-generated and
      # older npm reads its peer-dep resolution inconsistently (spurious "missing" deps).
      - name: Pin npm to 11 (match production)
        run: npm i -g npm@11

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      # The app gracefully degrades without secrets, so the build needs none.
      # Fail the build only on HIGH+ advisories (moderate transitive deps from the
      # Privy wallet stack are tracked separately and can't be fixed without a break).
      - name: Audit (high+)
        run: npm audit --audit-level=high
